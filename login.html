<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlowAI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .gradient-bg {
            background: linear-gradient(-45deg, #3B82F6, #10B981, #F59E0B, #EC4899);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    
    <!-- Login/Signup Container -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 max-w-md w-full">
        
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#3B82F6"/>
                        <stop offset="50%" style="stop-color:#10B981"/>
                        <stop offset="100%" style="stop-color:#F59E0B"/>
                    </linearGradient>
                </defs>
                <rect width="100" height="100" rx="20" fill="url(#logoGrad)"/>
                <rect x="25" y="55" width="15" height="30" rx="2.5" fill="white" opacity="0.7"/>
                <rect x="42.5" y="42.5" width="15" height="42.5" rx="2.5" fill="white" opacity="0.85"/>
                <rect x="60" y="27.5" width="15" height="57.5" rx="2.5" fill="white"/>
                <path d="M 30 65 L 42.5 52.5 L 60 37.5 L 72 27" stroke="#FDE047" stroke-width="3" stroke-linecap="round" fill="none"/>
                <circle cx="72" cy="27" r="4" fill="#FDE047"/>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">Welcome to CashFlowAI</h1>
        <p class="text-center text-gray-600 mb-8">Never run out of cash again</p>
        
        <!-- Tabs -->
        <div class="flex mb-8 bg-gray-100 rounded-xl p-1">
            <button id="loginTab" onclick="showLogin()" class="flex-1 py-3 rounded-lg font-semibold transition bg-white text-blue-600 shadow">
                Login
            </button>
            <button id="signupTab" onclick="showSignup()" class="flex-1 py-3 rounded-lg font-semibold transition text-gray-600">
                Sign Up
            </button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input 
                        type="email" 
                        id="loginEmail"
                        required
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="loginPassword"
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                </div>
                
                <button 
                    type="submit" 
                    id="loginButton"
                    class="w-full bg-gradient-to-r from-blue-600 to-green-600 text-white font-bold py-4 rounded-xl hover:shadow-xl transition transform hover:scale-105"
                >
                    Login →
                </button>
            </form>
            
            <button onclick="showReset()" class="w-full text-center text-sm text-blue-600 hover:text-blue-700 mt-4">
                Forgot password?
            </button>
        </div>
        
        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <form onsubmit="handleSignup(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                    <input 
                        type="text" 
                        id="signupName"
                        required
                        placeholder="John Doe"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input 
                        type="email" 
                        id="signupEmail"
                        required
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="signupPassword"
                        required
                        placeholder="••••••••"
                        minlength="6"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                    <p class="text-xs text-gray-500 mt-1">At least 6 characters</p>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                    <input 
                        type="password" 
                        id="signupPasswordConfirm"
                        required
                        placeholder="••••••••"
                        minlength="6"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                </div>
                
                <button 
                    type="submit"
                    id="signupButton"
                    class="w-full bg-gradient-to-r from-blue-600 to-green-600 text-white font-bold py-4 rounded-xl hover:shadow-xl transition transform hover:scale-105"
                >
                    Create Account →
                </button>
            </form>
        </div>
        
        <!-- Reset Password Form -->
        <div id="resetForm" class="hidden">
            <button onclick="showLogin()" class="text-sm text-gray-600 hover:text-gray-800 mb-4">
                ← Back to login
            </button>
            
            <form onsubmit="handleReset(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input 
                        type="email" 
                        id="resetEmail"
                        required
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition"
                    >
                </div>
                
                <button 
                    type="submit"
                    id="resetButton"
                    class="w-full bg-gradient-to-r from-blue-600 to-green-600 text-white font-bold py-4 rounded-xl hover:shadow-xl transition transform hover:scale-105"
                >
                    Send Reset Link →
                </button>
            </form>
        </div>
        
        <!-- Message Display -->
        <div id="message" class="hidden mt-4 p-4 rounded-xl"></div>
        
    </div>

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://ijgfdeiqgfgtsdxhjtq.supabase.co';
        const supabaseKey = 'sb_publishable_eqIjz2pzfZmvWTk8Gif5XA_zAgNnSv9';
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);
        
        // Tab switching
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('bg-white', 'text-blue-600', 'shadow');
            document.getElementById('loginTab').classList.remove('text-gray-600');
            document.getElementById('signupTab').classList.remove('bg-white', 'text-blue-600', 'shadow');
            document.getElementById('signupTab').classList.add('text-gray-600');
            hideMessage();
        }
        
        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('signupTab').classList.add('bg-white', 'text-blue-600', 'shadow');
            document.getElementById('signupTab').classList.remove('text-gray-600');
            document.getElementById('loginTab').classList.remove('bg-white', 'text-blue-600', 'shadow');
            document.getElementById('loginTab').classList.add('text-gray-600');
            hideMessage();
        }
        
        function showReset() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('resetForm').classList.remove('hidden');
            hideMessage();
        }
        
        // Message display
        function showMessage(text, isError = false) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = isError 
                ? 'mt-4 p-4 rounded-xl bg-red-50 border-2 border-red-200 text-red-700'
                : 'mt-4 p-4 rounded-xl bg-green-50 border-2 border-green-200 text-green-700';
            messageEl.classList.remove('hidden');
        }
        
        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }
        
        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();
            const button = document.getElementById('loginButton');
            button.disabled = true;
            button.textContent = 'Logging in...';
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                showMessage('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                showMessage(error.message || 'Login failed. Please try again.', true);
                button.disabled = false;
                button.textContent = 'Login →';
            }
        }
        
        // Handle Signup
        async function handleSignup(e) {
            e.preventDefault();
            
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            
            // Check if passwords match
            if (password !== passwordConfirm) {
                showMessage('Passwords do not match!', true);
                return;
            }
            
            const button = document.getElementById('signupButton');
            button.disabled = true;
            button.textContent = 'Creating account...';
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: name
                        },
                        emailRedirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) throw error;
                
                showMessage('Success! Check your email (' + email + ') to confirm your account.');
                
                // Clear form
                document.getElementById('signupName').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('signupPasswordConfirm').value = '';
                
            } catch (error) {
                showMessage(error.message || 'Signup failed. Please try again.', true);
            } finally {
                button.disabled = false;
                button.textContent = 'Create Account →';
            }
        }
        
        // Handle Password Reset
        async function handleReset(e) {
            e.preventDefault();
            const button = document.getElementById('resetButton');
            button.disabled = true;
            button.textContent = 'Sending...';
            
            const email = document.getElementById('resetEmail').value;
            
            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });
                
                if (error) throw error;
                
                showMessage('Password reset link sent! Check your email.');
                document.getElementById('resetEmail').value = '';
                
            } catch (error) {
                showMessage(error.message || 'Failed to send reset link. Please try again.', true);
            } finally {
                button.disabled = false;
                button.textContent = 'Send Reset Link →';
            }
        }
        
        // Check if user is already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
